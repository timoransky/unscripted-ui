name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Typechecks .astro/.ts and validates content frontmatter against the
      # collection schema (including the plainCss/features exclusivity rule).
      - run: npm run check
      # The build itself is the real test suite: it throws on missing demo
      # fragments, unknown feature keys, unresolvable BCD paths, and moved
      # token-paste markers.
      - run: npm run build
