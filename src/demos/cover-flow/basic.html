<!-- Gradient tiles stand in for cover art — swap each inner <div> for your own <img>. -->
<ul
  class="cover-flow flex w-full max-w-2xl snap-x snap-mandatory items-center gap-6 overflow-x-auto scroll-smooth overscroll-x-contain py-28 [--cover-size:10rem] [padding-inline:calc(50%-var(--cover-size)/2)] [scrollbar-width:none] focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-ring [&::-webkit-scrollbar]:hidden"
  tabindex="0"
  aria-label="Album covers"
>
  <li class="w-[var(--cover-size)] shrink-0 snap-center">
    <div
      draggable="false"
      class="flex aspect-square w-full flex-col justify-end rounded-xl bg-[linear-gradient(135deg,#6366f1,#d946ef)] p-4 shadow-lg select-none"
    >
      <span class="text-sm font-semibold text-white">Neon Tides</span>
      <span class="text-xs text-white/70">Halcyon</span>
    </div>
  </li>
  <li class="w-[var(--cover-size)] shrink-0 snap-center">
    <div
      draggable="false"
      class="flex aspect-square w-full flex-col justify-end rounded-xl bg-[linear-gradient(135deg,#f59e0b,#ef4444)] p-4 shadow-lg select-none"
    >
      <span class="text-sm font-semibold text-white">Golden Hour</span>
      <span class="text-xs text-white/70">Ember</span>
    </div>
  </li>
  <li class="w-[var(--cover-size)] shrink-0 snap-center">
    <div

    >
      <span class="text-sm font-semibold text-white">Deep Current</span>
      <span class="text-xs text-white/70">Meridian</span>
    </div>
  </li>
  <li class="w-[var(--cover-size)] shrink-0 snap-center">
    <div
      draggable="false"

  <li class="w-[var(--cover-size)] shrink-0 snap-center">
